name: BeneFitU Mock API CI/CD

on:
  push:
    branches: [ "mock/api" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 가상 컴퓨터로 소스코드 땡겨오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Java JDK 21 세팅 (자바 21 완벽 매핑)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. 그래들 빌드 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 스프링 부트 프로젝트 빌드 (여기서 build/libs/*.jar가 생성됨)
      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # 5. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest

# 7. 실서버(EC2 등)에 SSH로 원격 접속하여 폴더 생성, 파일 세팅 및 도커 컴포즈 가동
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. 프로젝트 폴더가 없다면 자동으로 생성하고 이동
            mkdir -p /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            cd /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend

            # 2. DB 및 Docker 관련 환경변수를 .env에 동적 주입
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env

            # 3. 서버에 docker-compose.yml 파일이 없을 테니, 여기서 직접 동적으로 생성해 버립니다.
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/benefitu-backend:latest
                container_name: benefitu-backend
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
                  - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
                  - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
                depends_on:
                  - db

              db:
                image: mysql:8.0
                container_name: benefitu-db
                ports:
                  - "3306:3306"
                environment:
                  - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
                  - MYSQL_DATABASE=${MYSQL_DATABASE}
                volumes:
                  - mysql_data:/var/lib/mysql

            volumes:
              mysql_data:
            EOF

            # 4. 도커 허브에서 최신 이미지를 땡겨오고 실행
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

name: BeneFitU Mock API CI/CD

on:
  push:
    branches: [ "mock/api" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            cd /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            
            # .env 파일 생성
            cat << EOF > .env
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            EOF
            
            # docker-compose.yml 파일 생성
            cat << EOF > docker-compose.yml
            version: '3.8'
            services:
              db:
                image: mysql:8.0
                container_name: benefitu-db
                restart: always
                ports:
                  - "3307:3306"
                environment:
                  MYSQL_ROOT_PASSWORD: \${MYSQL_ROOT_PASSWORD}
                  MYSQL_DATABASE: \${MYSQL_DATABASE}
                  MYSQL_USER: \${SPRING_DATASOURCE_USERNAME}
                  MYSQL_PASSWORD: \${SPRING_DATASOURCE_PASSWORD}
                volumes:
                  - mysql_data:/var/lib/mysql
              backend:
                image: ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest
                container_name: benefitu-backend
                restart: always
                ports:
                  - "8080:8080"
                environment:
                  SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/\${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
                  SPRING_DATASOURCE_USERNAME: \${SPRING_DATASOURCE_USERNAME}
                  SPRING_DATASOURCE_PASSWORD: \${SPRING_DATASOURCE_PASSWORD}
                depends_on:
                  - db
            volumes:
              mysql_data:
            EOF
            
            # 컨테이너 재실행
            docker compose down
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
name: BeneFitU Mock API CI/CD

on:
  push:
    branches: [ "mock/api" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 가상 컴퓨터로 소스코드 땡겨오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Java JDK 21 세팅 (자바 21 완벽 매핑)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. 그래들 빌드 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 스프링 부트 프로젝트 빌드 (여기서 build/libs/*.jar가 생성됨)
      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # 5. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest

      # 7. 실서버(EC2 등)에 SSH로 원격 접속하여 .env 동적 생성 및 도커 컴포즈 가동
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            
            # DB 및 Docker 관련 환경변수를 .env에 동적 주입
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env
            
            # 도커 허브에서 6번 단계가 올려둔 최신 이미지를 실서버로 땡겨옴
            docker compose pull
            
            # 최신 다운로드된 이미지로 컨테이너를 강제 재생성(--force-recreate)
            docker compose up -d --force-recreate
            
            # 사용하지 않는 옛날 이미지(명명되지 않은 쓰레기 이미지) 깔끔하게 청소
            docker image prune -f
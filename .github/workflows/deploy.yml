name: BeneFitU Mock API CI/CD

on:
  push:
    branches: [ "mock/api" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/benefitu-backend:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            cd /home/${{ secrets.USERNAME }}/likeLion/BeneFitU-Backend
            
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> .env
            
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: ${DOCKER_USERNAME}/benefitu-backend:latest
                container_name: benefitu-backend
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
                  - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
                  - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
                depends_on:
                  - db
              db:
                image: mysql:8.0
                container_name: benefitu-db
                ports:
                  - "3306:3306"
                environment:
                  - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
                  - MYSQL_DATABASE=${MYSQL_DATABASE}
                volumes:
                  - mysql_data:/var/lib/mysql
            volumes:
              mysql_data:
            EOF
            
            # Docker Compose 실행 시 .env를 명시적으로 참조하도록 설정
            docker compose --env-file .env down
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --force-recreate
            docker image prune -f